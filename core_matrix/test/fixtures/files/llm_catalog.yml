version: 1

providers:
  codex_subscription:
    display_name: Codex Subscription
    enabled: true
    environments:
      - development
      - test
      - production
    adapter_key: codex_subscription_responses
    base_url: https://api.openai.example.test/v1
    headers: {}
    wire_api: responses
    transport: https
    responses_path: /responses
    requires_credential: true
    credential_kind: oauth_codex
    metadata:
      access_model: bundled_subscription
      owner_scope: installation
    admission_control:
      max_concurrent_requests: 4
      cooldown_seconds: 15
    models:
      gpt-5.4:
        enabled: true
        display_name: GPT-5.4
        api_model: gpt-5.4
        tokenizer_hint: o200k_base
        context_window_tokens: 1000000
        max_output_tokens: 128000
        context_soft_limit_ratio: 0.9
        request_defaults:
          reasoning_effort: high
        metadata: {}
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          streaming: true
          conversation_state: true
          provider_builtin_tools: true
          image_generation: false
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true
