shared:
  providers:
    codex_subscription:
      display_name: Codex Subscription
      metadata:
        access_model: bundled_subscription
        owner_scope: installation
      models:
        gpt-5.4:
          display_name: GPT-5.4
          context_window_tokens: 272000
          max_output_tokens: 128000
          metadata:
            release_channel: stable
            provider_family: codex
          capabilities:
            text_output: true
            tool_calls: true
            structured_output: true
            multimodal_inputs:
              image: true
              audio: false
              video: false
              file: true
    openai:
      display_name: OpenAI
      metadata:
        api_family: responses
        owner_scope: installation
      models:
        gpt-5.3-chat-latest:
          display_name: GPT-5.3 Chat Latest
          context_window_tokens: 272000
          max_output_tokens: 128000
          metadata:
            release_channel: latest
            provider_family: openai
          capabilities:
            text_output: true
            tool_calls: true
            structured_output: true
            multimodal_inputs:
              image: true
              audio: false
              video: false
              file: true
  model_roles:
    main:
      - codex_subscription/gpt-5.4
      - openai/gpt-5.3-chat-latest
    planner:
      - openai/gpt-5.3-chat-latest
    coder:
      - codex_subscription/gpt-5.4
      - openai/gpt-5.3-chat-latest
