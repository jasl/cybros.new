<%
  runtime_topology = ActiveSupport::ConfigurationFile.parse(Rails.root.join("config/runtime_topology.yml")) || {}
  runtime_topology = runtime_topology.deep_stringify_keys

  queue_workers = []

  runtime_topology.fetch("llm_queues").each_value do |worker|
    queue_workers << {
      "queues" => worker.fetch("queue"),
      "threads" => ENV.fetch(worker.fetch("threads_env"), worker.fetch("default_threads")),
      "processes" => ENV.fetch(worker.fetch("processes_env"), worker.fetch("default_processes")),
      "polling_interval" => worker.fetch("polling_interval")
    }
  end

  runtime_topology.fetch("shared_queues").each_value do |worker|
    queue_workers << {
      "queues" => worker.fetch("queue"),
      "threads" => ENV.fetch(worker.fetch("threads_env"), worker.fetch("default_threads")),
      "processes" => ENV.fetch(worker.fetch("processes_env"), worker.fetch("default_processes")),
      "polling_interval" => worker.fetch("polling_interval")
    }
  end
%>
default: &default
  dispatchers:
<% runtime_topology.fetch("dispatchers").each do |dispatcher| %>
    - polling_interval: <%= dispatcher.fetch("polling_interval") %>
      batch_size: <%= dispatcher.fetch("batch_size") %>
<% end %>
  workers:
<% queue_workers.each do |worker| %>
    - queues: "<%= worker.fetch("queues") %>"
      threads: <%= worker.fetch("threads") %>
      processes: <%= worker.fetch("processes") %>
      polling_interval: <%= worker.fetch("polling_interval") %>
<% end %>

development:
  <<: *default

production:
  <<: *default
