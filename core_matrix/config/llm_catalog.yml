          reasoning_effort: xhigh
        metadata:
          release_channel: stable
          provider_family: codex
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true

