version: 1

providers:
  codex_subscription:
    display_name: Codex Subscription
    enabled: true
    environments:
      - development
      - test
      - production
    adapter_key: codex_subscription_responses
    base_url: https://api.openai.com/v1
    headers: {}
    wire_api: responses
    transport: https
    responses_path: /responses
    requires_credential: true
    credential_kind: oauth_codex
    metadata:
      access_model: bundled_subscription
      owner_scope: installation
    models:
      gpt-5.3-codex:
        display_name: GPT-5.3 Codex
        api_model: gpt-5.3-codex
        tokenizer_hint: o200k_base
        context_window_tokens: 400000
        max_output_tokens: 128000
        context_soft_limit_ratio: 0.8
        request_defaults:
          reasoning_effort: medium
        metadata:
          release_channel: stable
          provider_family: codex
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true
      gpt-5.4:
        display_name: GPT-5.4
        api_model: gpt-5.4
        tokenizer_hint: o200k_base
        context_window_tokens: 1000000
        max_output_tokens: 128000
        context_soft_limit_ratio: 0.9
        request_defaults:
          reasoning_effort: high
        metadata:
          release_channel: stable
          provider_family: codex
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true
      gpt-5.4-extra-high:
        display_name: GPT-5.4 Extra High
        api_model: gpt-5.4
        tokenizer_hint: o200k_base
        context_window_tokens: 1000000
        max_output_tokens: 128000
        context_soft_limit_ratio: 0.9
