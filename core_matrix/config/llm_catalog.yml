version: 1

providers:
  codex_subscription:
    display_name: Codex Subscription
    enabled: true
    environments:
      - development
      - test
      - production
    adapter_key: codex_subscription_responses
    base_url: https://api.openai.com/v1
    headers: {}
    wire_api: responses
    transport: https
    responses_path: /responses
    requires_credential: true
    credential_kind: oauth_codex
    metadata:
      access_model: bundled_subscription
      owner_scope: installation
    models:
      gpt-5.4:
        display_name: GPT-5.4
        api_model: gpt-5.4
        tokenizer_hint: o200k_base
        context_window_tokens: 272000
        max_output_tokens: 128000
        context_soft_limit_ratio: 0.8
        request_defaults: {}
        metadata:
          release_channel: stable
          provider_family: codex
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true

  openai:
    display_name: OpenAI
    enabled: true
    environments:
      - development
      - test
      - production
    adapter_key: openai_responses
    base_url: https://api.openai.com/v1
    headers: {}
    wire_api: responses
    transport: https
    responses_path: /responses
    requires_credential: true
    credential_kind: api_key
    metadata:
      api_family: responses
      owner_scope: installation
    models:
      gpt-5.3-chat-latest:
        display_name: GPT-5.3 Chat Latest
        api_model: gpt-5.3-chat-latest
        tokenizer_hint: o200k_base
        context_window_tokens: 272000
        max_output_tokens: 128000
        context_soft_limit_ratio: 0.8
        request_defaults: {}
        metadata:
          release_channel: latest
          provider_family: openai
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true

  openrouter:
    display_name: OpenRouter
    enabled: true
    environments:
      - development
      - test
      - production
    adapter_key: openrouter_chat_completions
    base_url: https://openrouter.ai/api/v1
    headers: {}
    wire_api: chat_completions
    transport: https
    responses_path: /chat/completions
    requires_credential: true
    credential_kind: api_key
    metadata:
      provider_family: openrouter
      owner_scope: installation
    models:
      openai-gpt-5.4:
        display_name: OpenAI GPT-5.4
        api_model: openai/gpt-5.4
        tokenizer_hint: o200k_base
        context_window_tokens: 272000
        max_output_tokens: 128000
        context_soft_limit_ratio: 0.8
        request_defaults: {}
        metadata:
          provider_family: openrouter
          upstream_provider: openai
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true

  dev:
    display_name: Development Mock LLM
    enabled: true
    environments:
      - development
      - test
    adapter_key: mock_llm_chat_completions
    base_url: http://127.0.0.1:3000/mock_llm/v1
    headers: {}
    wire_api: chat_completions
    transport: http
    responses_path: /chat/completions
    requires_credential: false
    credential_kind: none
    metadata:
      provider_family: mock
      owner_scope: installation
    models:
      mock-model:
        display_name: Mock Model
        api_model: mock-model
        tokenizer_hint: o200k_base
        context_window_tokens: 128000
        max_output_tokens: 16384
        context_soft_limit_ratio: 0.8
        request_defaults: {}
        metadata:
          provider_family: mock
          mock_variant: text
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: false
            audio: false
            video: false
            file: true
      vision-model:
        display_name: Vision Mock Model
        api_model: vision-model
        tokenizer_hint: o200k_base
        context_window_tokens: 128000
        max_output_tokens: 16384
        context_soft_limit_ratio: 0.8
        request_defaults: {}
        metadata:
          provider_family: mock
          mock_variant: vision
        capabilities:
          text_output: true
          tool_calls: true
          structured_output: true
          multimodal_inputs:
            image: true
            audio: false
            video: false
            file: true

  ollama:
    display_name: Ollama
    enabled: false
    environments:
      - development
      - test
      - production
    adapter_key: ollama_chat
    base_url: http://127.0.0.1:11434
    headers: {}
    wire_api: chat_completions
    transport: http
    responses_path: /api/chat
    requires_credential: false
    credential_kind: none
    metadata:
      provider_family: ollama
      owner_scope: installation
    models:
      qwen3-14b:
        display_name: Qwen3 14B
        api_model: qwen3:14b
        tokenizer_hint: cl100k_base
        context_window_tokens: 32768
        max_output_tokens: 8192
        context_soft_limit_ratio: 0.8
        request_defaults: {}
        metadata:
          provider_family: ollama
        capabilities:
          text_output: true
          tool_calls: false
          structured_output: false
          multimodal_inputs:
            image: false
            audio: false
            video: false
            file: false

  llama_cpp:
    display_name: llama.cpp
    enabled: false
    environments:
      - development
      - test
      - production
    adapter_key: llama_cpp_chat_completions
    base_url: http://127.0.0.1:8080/v1
    headers: {}
    wire_api: chat_completions
    transport: http
    responses_path: /chat/completions
    requires_credential: false
    credential_kind: none
    metadata:
      provider_family: llama_cpp
      owner_scope: installation
    models:
      llama-3.2-3b-instruct:
        display_name: Llama 3.2 3B Instruct
        api_model: llama-3.2-3b-instruct
        tokenizer_hint: cl100k_base
        context_window_tokens: 8192
        max_output_tokens: 4096
        context_soft_limit_ratio: 0.8
        request_defaults: {}
        metadata:
          provider_family: llama_cpp
        capabilities:
          text_output: true
          tool_calls: false
          structured_output: false
          multimodal_inputs:
            image: false
            audio: false
            video: false
            file: false

model_roles:
  main:
    - codex_subscription/gpt-5.4
    - openai/gpt-5.3-chat-latest
    - openrouter/openai-gpt-5.4
    - dev/mock-model
  planner:
    - openai/gpt-5.3-chat-latest
  coder:
    - codex_subscription/gpt-5.4
    - openai/gpt-5.3-chat-latest
    - openrouter/openai-gpt-5.4
    - dev/mock-model
