<%
  runtime_topology = ActiveSupport::ConfigurationFile.parse(Rails.root.join("config/runtime_topology.yml")) || {}
  runtime_topology = runtime_topology.deep_stringify_keys

  queue_thread_budget =
    runtime_topology.fetch("llm_queues").values.sum { |worker| worker.fetch("default_threads").to_i * worker.fetch("default_processes").to_i } +
    runtime_topology.fetch("shared_queues").values.sum { |worker| worker.fetch("default_threads").to_i * worker.fetch("default_processes").to_i }

  round_up = ->(value, step) { ((value + step - 1) / step) * step }
  global_pool_override = ENV["RAILS_DB_POOL"]
  primary_pool_default = global_pool_override ? global_pool_override.to_i : [ENV.fetch("RAILS_MAX_THREADS", 8).to_i, 16].max
  queue_pool_default = global_pool_override ? global_pool_override.to_i : round_up.call([queue_thread_budget, 16].max, 8)
  cable_pool_default = global_pool_override ? global_pool_override.to_i : 16

  primary_pool = ENV.fetch("RAILS_PRIMARY_DB_POOL", primary_pool_default)
  queue_pool = ENV.fetch("RAILS_QUEUE_DB_POOL", queue_pool_default)
  cable_pool = ENV.fetch("RAILS_CABLE_DB_POOL", cable_pool_default)
%>
# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= global_pool_override ? global_pool_override.to_i : 16 %>

development:
  primary:
    <<: *default
    pool: <%= primary_pool %>
    <% if ENV["RAILS_DB_URL_BASE"] %>
    url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_primary_development"
    <% else %>
    database: core_matrix_primary_development
    <% end %>
  queue:
    <<: *default
    pool: <%= queue_pool %>
    <% if ENV["RAILS_DB_URL_BASE"] %>
    url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_queue_development"
    <% else %>
    database: core_matrix_queue_development
    <% end %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    pool: <%= cable_pool %>
    <% if ENV["RAILS_DB_URL_BASE"] %>
    url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_cable_development"
    <% else %>
    database: core_matrix_cable_development
    <% end %>
    migrations_paths: db/cable_migrate

  # The specified database role being used to connect to PostgreSQL.
  # To create additional roles in PostgreSQL see `$ createuser --help`.
  # When left blank, PostgreSQL will use the default role. This is
  # the same name as the operating system user running Rails.
  #username: dummy

  # The password associated with the PostgreSQL role (username).
  #password:

  # Connect on a TCP socket. Omitted by default since the client uses a
  # domain socket that doesn't need configuration. Windows does not have
  # domain sockets, so uncomment these lines.
  #host: localhost

  # The TCP port the server listens on. Defaults to 5432.
  # If your server runs on a different port number, change accordingly.
  #port: 5432

  # Schema search path. The server defaults to $user,public
  #schema_search_path: myapp,sharedapp,public

  # Minimum log levels, in increasing order:
  #   debug5, debug4, debug3, debug2, debug1,
  #   log, notice, warning, error, fatal, and panic
  # Defaults to warning.
  #min_messages: notice

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  pool: <%= primary_pool %>
  <% if ENV["RAILS_DB_URL_BASE"] %>
  url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_test"
  <% else %>
  database: core_matrix_test
  <% end %>

# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
production:
  primary: &primary_production
    <<: *default
    pool: <%= primary_pool %>
    url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_primary_production"
  cache:
    <<: *primary_production
    url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_cache_production"
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    pool: <%= queue_pool %>
    url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_queue_production"
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    pool: <%= cable_pool %>
    url: "<%= ENV["RAILS_DB_URL_BASE"] %>/core_matrix_cable_production"
    migrations_paths: db/cable_migrate
