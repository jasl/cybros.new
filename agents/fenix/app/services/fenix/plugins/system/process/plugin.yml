plugin_id: system.process
version: 1
display_name: Process
default_runtime_plane: environment
tool_catalog:
  - tool_name: process_exec
    tool_kind: kernel_primitive
    operator_group: process_run
    resource_identity_kind: process_run
    mutates_state: true
    implementation_source: agent
    implementation_ref: fenix/runtime/process_exec
    input_schema:
      type: object
      properties:
        command_line:
          type: string
        kind:
          type: string
        proxy_port:
          type: integer
    result_schema:
      type: object
      properties:
        process_run_id:
          type: string
        lifecycle_state:
          type: string
        proxy_path:
          type: string
        proxy_target_url:
          type: string
    streaming_support: true
    idempotency_policy: best_effort
  - tool_name: process_list
    tool_kind: kernel_primitive
    operator_group: process_run
    resource_identity_kind: process_run
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/process_list
    input_schema:
      type: object
      properties: {}
    result_schema:
      type: object
      properties:
        entries:
          type: array
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: process_read_output
    tool_kind: kernel_primitive
    operator_group: process_run
    resource_identity_kind: process_run
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/process_read_output
    input_schema:
      type: object
      properties:
        process_run_id:
          type: string
    result_schema:
      type: object
      properties:
        process_run_id:
          type: string
        stdout_tail:
          type: string
        stderr_tail:
          type: string
        stdout_bytes:
          type: integer
        stderr_bytes:
          type: integer
        lifecycle_state:
          type: string
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: process_proxy_info
    tool_kind: kernel_primitive
    operator_group: process_run
    resource_identity_kind: process_run
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/process_proxy_info
    input_schema:
      type: object
      properties:
        process_run_id:
          type: string
    result_schema:
      type: object
      properties:
        process_run_id:
          type: string
        proxy_path:
          type: string
        proxy_target_url:
          type: string
    streaming_support: false
    idempotency_policy: best_effort
config_schema: {}
requirements:
  caddy: optional
env_contract:
  FENIX_DEV_PROXY_PORT:
    required: false
  FENIX_DEV_PROXY_ROUTES_FILE:
    required: false
