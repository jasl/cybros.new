plugin_id: system.memory
version: 1
display_name: Memory
default_runtime_plane: environment
tool_catalog:
  - tool_name: memory_get
    tool_kind: kernel_primitive
    operator_group: memory
    resource_identity_kind: memory_scope
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/memory_get
    input_schema:
      type: object
      properties:
        scope:
          type: string
    result_schema:
      type: object
      properties:
        scope:
          type: string
        root_memory:
          type: string
        conversation_summary:
          type: string
        conversation_memory:
          type: string
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: memory_search
    tool_kind: kernel_primitive
    operator_group: memory
    resource_identity_kind: memory_scope
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/memory_search
    input_schema:
      type: object
      properties:
        query:
          type: string
        limit:
          type: integer
    result_schema:
      type: object
      properties:
        query:
          type: string
        matches:
          type: array
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: memory_store
    tool_kind: kernel_primitive
    operator_group: memory
    resource_identity_kind: memory_scope
    mutates_state: true
    implementation_source: agent
    implementation_ref: fenix/runtime/memory_store
    input_schema:
      type: object
      properties:
        text:
          type: string
        title:
          type: string
        scope:
          type: string
    result_schema:
      type: object
      properties:
        scope:
          type: string
        memory_path:
          type: string
        bytes_written:
          type: integer
    streaming_support: false
    idempotency_policy: best_effort
config_schema: {}
requirements:
  fenix_memory_layout: required
env_contract: {}
