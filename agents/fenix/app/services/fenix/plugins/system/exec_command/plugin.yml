plugin_id: system.exec_command
version: 1
display_name: Exec Command
default_runtime_plane: environment
tool_catalog:
  - tool_name: exec_command
    tool_kind: kernel_primitive
    operator_group: command_run
    resource_identity_kind: command_run
    mutates_state: true
    implementation_source: agent
    implementation_ref: fenix/runtime/exec_command
    input_schema:
      type: object
      properties:
        command_line:
          type: string
        timeout_seconds:
          type: integer
        pty:
          type: boolean
    result_schema:
      type: object
      properties:
        exit_status:
          type: integer
        command_run_id:
          type: string
        output_streamed:
          type: boolean
        stdout_bytes:
          type: integer
        stderr_bytes:
          type: integer
    streaming_support: true
    idempotency_policy: best_effort
  - tool_name: write_stdin
    tool_kind: kernel_primitive
    operator_group: command_run
    resource_identity_kind: command_run
    mutates_state: true
    implementation_source: agent
    implementation_ref: fenix/runtime/write_stdin
    input_schema:
      type: object
      properties:
        command_run_id:
          type: string
        text:
          type: string
        eof:
          type: boolean
        wait_for_exit:
          type: boolean
        timeout_seconds:
          type: integer
    result_schema:
      type: object
      properties:
        command_run_id:
          type: string
        stdin_bytes:
          type: integer
        session_closed:
          type: boolean
        exit_status:
          type: integer
        stdout_bytes:
          type: integer
        stderr_bytes:
          type: integer
    streaming_support: true
    idempotency_policy: best_effort
config_schema: {}
requirements:
  active_job_topology: local_only
env_contract: {}
