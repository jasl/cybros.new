    tool_kind: kernel_primitive
    implementation_source: agent
    implementation_ref: fenix/runtime/workspace_write
    input_schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
    result_schema:
      type: object
      properties:
        path:
          type: string
        bytes_written:
          type: integer
    streaming_support: false
    idempotency_policy: best_effort
config_schema: {}
requirements:
  workspace_root: mounted
env_contract: {}
