services:
  fenix:
    build: .
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=fenix-compose-dev-only-secret-key-base
      - CORE_MATRIX_BASE_URL=http://core-matrix:3000
      - CORE_MATRIX_MACHINE_CREDENTIAL=replace-me
      - PLAYWRIGHT_BROWSERS_PATH=/rails/.playwright
      - FENIX_DEV_PROXY_PORT=3310
      - FENIX_DEV_PROXY_ROUTES_FILE=/rails/tmp/dev-proxy/routes.caddy
    ports:
      - "3101:80"
    volumes:
      - ./workspace:/workspace
      - fenix_proxy_routes:/rails/tmp/dev-proxy

  fenix-dev-proxy:
    build: .
    command: /rails/bin/fenix-dev-proxy
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/rails/.playwright
      - FENIX_DEV_PROXY_PORT=3310
      - FENIX_DEV_PROXY_ROUTES_FILE=/rails/tmp/dev-proxy/routes.caddy
    ports:
      - "3310:3310"
    volumes:
      - ./workspace:/workspace
      - fenix_proxy_routes:/rails/tmp/dev-proxy

volumes:
  fenix_proxy_routes:
