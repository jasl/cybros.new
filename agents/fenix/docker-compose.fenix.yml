services:
  fenix:
    build: .
    env_file:
      - ./.env
    environment:
      - RAILS_ENV=production
    ports:
      - "3101:80"
    volumes:
      - ./tmp/docker-workspace:/workspace
      - fenix_storage:/rails/storage
      - fenix_proxy_routes:/rails/tmp/dev-proxy

  fenix-dev-proxy:
    build: .
    command: /rails/bin/fenix-dev-proxy
    env_file:
      - ./.env
    environment:
      - RAILS_ENV=production
    ports:
      - "3310:3310"
    volumes:
      - ./tmp/docker-workspace:/workspace
      - fenix_proxy_routes:/rails/tmp/dev-proxy

volumes:
  fenix_storage:
  fenix_proxy_routes:
