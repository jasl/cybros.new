# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  timeout: 5000

<% storage_root = ENV.fetch("FENIX_STORAGE_ROOT", "storage") %>

development:
  primary:
    <<: *default
    database: <%= File.join(storage_root, "development.sqlite3") %>
    max_connections: <%= ENV.fetch("FENIX_PRIMARY_DB_POOL", 8) %>
  queue:
    <<: *default
    database: <%= File.join(storage_root, "development_queue.sqlite3") %>
    migrations_paths: db/queue_migrate
    max_connections: <%= ENV.fetch("FENIX_QUEUE_DB_POOL", 16) %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: <%= File.join(storage_root, "test.sqlite3") %>
    max_connections: <%= ENV.fetch("FENIX_PRIMARY_DB_POOL", 8) %>
  queue:
    <<: *default
    database: <%= File.join(storage_root, "test_queue.sqlite3") %>
    migrations_paths: db/queue_migrate
    max_connections: <%= ENV.fetch("FENIX_QUEUE_DB_POOL", 16) %>

# SQLite3 write its data on the local filesystem, as such it requires
# persistent disks. If you are deploying to a managed service, you should
# make sure it provides disk persistence, as many don't.
#
# Similarly, if you deploy your application as a Docker container, you must
# ensure the database is located in a persisted volume.
production:
  primary:
    <<: *default
    database: <%= File.join(storage_root, "production.sqlite3") %>
    max_connections: <%= ENV.fetch("FENIX_PRIMARY_DB_POOL", 8) %>
  cache:
    <<: *default
    database: <%= File.join(storage_root, "production_cache.sqlite3") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= File.join(storage_root, "production_queue.sqlite3") %>
    migrations_paths: db/queue_migrate
    max_connections: <%= ENV.fetch("FENIX_QUEUE_DB_POOL", 16) %>
