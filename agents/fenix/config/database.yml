<%
  runtime_topology = ActiveSupport::ConfigurationFile.parse(Rails.root.join("config/runtime_topology.yml")) || {}
  runtime_topology = runtime_topology.deep_stringify_keys
  primary_pool = runtime_topology.fetch("database_pools").fetch("primary")
  queue_pool = runtime_topology.fetch("database_pools").fetch("queue")
%>
# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
    max_connections: <%= ENV.fetch(primary_pool.fetch("env"), primary_pool.fetch("default")) %>
  queue:
    <<: *default
    database: storage/queue_development.sqlite3
    migrations_paths: db/queue_migrate
    max_connections: <%= ENV.fetch(queue_pool.fetch("env"), queue_pool.fetch("default")) %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: storage/test.sqlite3
    max_connections: <%= ENV.fetch(primary_pool.fetch("env"), primary_pool.fetch("default")) %>
  queue:
    <<: *default
    database: storage/queue_test.sqlite3
    migrations_paths: db/queue_migrate
    max_connections: <%= ENV.fetch(queue_pool.fetch("env"), queue_pool.fetch("default")) %>

# SQLite3 write its data on the local filesystem, as such it requires
# persistent disks. If you are deploying to a managed service, you should
# make sure it provides disk persistence, as many don't.
#
# Similarly, if you deploy your application as a Docker container, you must
# ensure the database is located in a persisted volume.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
    max_connections: <%= ENV.fetch(primary_pool.fetch("env"), primary_pool.fetch("default")) %>
  queue:
    <<: *default
    database: storage/queue_production.sqlite3
    migrations_paths: db/queue_migrate
    max_connections: <%= ENV.fetch(queue_pool.fetch("env"), queue_pool.fetch("default")) %>
