default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "runtime_control"
      threads: <%= ENV.fetch("SQ_THREADS_RUNTIME_CONTROL", 8) %>
      processes: <%= ENV.fetch("SQ_PROCESSES_RUNTIME_CONTROL", 1) %>
      polling_interval: 0.1
    - queues: "maintenance"
      threads: <%= ENV.fetch("SQ_THREADS_MAINTENANCE", 1) %>
      processes: <%= ENV.fetch("SQ_PROCESSES_MAINTENANCE", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
