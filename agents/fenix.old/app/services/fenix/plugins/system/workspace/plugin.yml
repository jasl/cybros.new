plugin_id: system.workspace
version: 1
display_name: Workspace
default_control_plane: executor
tool_catalog:
  - tool_name: workspace_read
    tool_kind: kernel_primitive
    operator_group: workspace
    resource_identity_kind: workspace_path
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/workspace_read
    input_schema:
      type: object
      properties:
        path:
          type: string
    result_schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
        bytes_read:
          type: integer
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: workspace_write
    tool_kind: kernel_primitive
    operator_group: workspace
    resource_identity_kind: workspace_path
    mutates_state: true
    implementation_source: agent
    implementation_ref: fenix/runtime/workspace_write
    input_schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
    result_schema:
      type: object
      properties:
        path:
          type: string
        bytes_written:
          type: integer
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: workspace_tree
    tool_kind: kernel_primitive
    operator_group: workspace
    resource_identity_kind: workspace_path
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/workspace_tree
    input_schema:
      type: object
      properties:
        path:
          type: string
        limit:
          type: integer
    result_schema:
      type: object
      properties:
        path:
          type: string
        entries:
          type: array
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: workspace_stat
    tool_kind: kernel_primitive
    operator_group: workspace
    resource_identity_kind: workspace_path
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/workspace_stat
    input_schema:
      type: object
      properties:
        path:
          type: string
    result_schema:
      type: object
      properties:
        path:
          type: string
        node_type:
          type: string
        size_bytes:
          type: integer
    streaming_support: false
    idempotency_policy: best_effort
  - tool_name: workspace_find
    tool_kind: kernel_primitive
    operator_group: workspace
    resource_identity_kind: workspace_path
    mutates_state: false
    implementation_source: agent
    implementation_ref: fenix/runtime/workspace_find
    input_schema:
      type: object
      properties:
        path:
          type: string
        query:
          type: string
        limit:
          type: integer
    result_schema:
      type: object
      properties:
        path:
          type: string
        query:
          type: string
        matches:
          type: array
    streaming_support: false
    idempotency_policy: best_effort
config_schema: {}
requirements:
  workspace_root: mounted
env_contract: {}
