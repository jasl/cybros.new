services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - core-matrix-postgres:/var/lib/postgresql/data

  core_matrix:
    build:
      context: ./core_matrix
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${CORE_MATRIX_MASTER_KEY:?set CORE_MATRIX_MASTER_KEY}
      RAILS_DB_URL_BASE: postgresql://postgres:postgres@postgres:5432
      CORE_MATRIX_BASE_URL: http://core_matrix:80
    ports:
      - "3000:80"

  fenix:
    build:
      context: ./agents/fenix
      dockerfile: Dockerfile
    depends_on:
      core_matrix:
        condition: service_started
    environment:
      RAILS_ENV: production
      CORE_MATRIX_BASE_URL: http://core_matrix:80
      FENIX_PUBLIC_BASE_URL: http://fenix:80
      FENIX_HOME_ROOT: /rails/storage/fenix-home
      FENIX_STORAGE_ROOT: /rails/storage
    ports:
      - "3101:80"
    volumes:
      - fenix-storage:/rails/storage

  nexus:
    build:
      context: ./execution_runtimes/nexus
      dockerfile: Dockerfile
      args:
        NEXUS_BASE_IMAGE: ${NEXUS_BASE_IMAGE:-cybros-nexus-base:latest}
    depends_on:
      core_matrix:
        condition: service_started
      nexus_base:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: production
      CORE_MATRIX_BASE_URL: http://core_matrix:80
      NEXUS_PUBLIC_BASE_URL: http://nexus:80
      NEXUS_HOME_ROOT: /rails/storage/nexus-home
      NEXUS_STORAGE_ROOT: /rails/storage
    ports:
      - "3201:80"
    volumes:
      - nexus-storage:/rails/storage

  nexus_base:
    image: cybros-nexus-base:latest
    build:
      context: .
      dockerfile: images/nexus/Dockerfile
    command: ["true"]
    restart: "no"

volumes:
  core-matrix-postgres:
  fenix-storage:
  nexus-storage:
