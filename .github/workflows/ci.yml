name: CI

on:
  pull_request:
    paths-ignore:
      - "references/**"
  push:
    branches:
      - main
    paths-ignore:
      - "references/**"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent_fenix: ${{ steps.detect.outputs.agent_fenix }}
      core_matrix: ${{ steps.detect.outputs.core_matrix }}
      core_matrix_cli: ${{ steps.detect.outputs.core_matrix_cli }}
      execution_runtime_nexus: ${{ steps.detect.outputs.execution_runtime_nexus }}
      images_nexus: ${{ steps.detect.outputs.images_nexus }}
      simple_inference: ${{ steps.detect.outputs.simple_inference }}
      verification: ${{ steps.detect.outputs.verification }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            head_sha="${{ github.sha }}"
            mapfile -t changed_files < <(git diff-tree --root --no-commit-id --name-only -r "$head_sha")
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")
          fi

          agent_fenix=false
          core_matrix=false
          core_matrix_cli=false
          execution_runtime_nexus=false
          images_nexus=false
          simple_inference=false
          verification=false

          echo "Changed files:"
          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "(none)"
          fi

          for file in "${changed_files[@]}"; do
            [[ -z "$file" ]] && continue
            echo "- $file"

            case "$file" in
              references/*)
                ;;
              AGENTS.md|.editorconfig|.gitattributes|.gitignore|.github/workflows/*)
                agent_fenix=true
                core_matrix=true
                core_matrix_cli=true
                execution_runtime_nexus=true
                images_nexus=true
                simple_inference=true
                verification=true
                ;;
              verification/*)
                verification=true
                ;;
              core_matrix_cli/*)
                core_matrix_cli=true
                ;;
              agents/fenix/*)
                agent_fenix=true
                ;;
              execution_runtimes/nexus/*)
                execution_runtime_nexus=true
                ;;
              images/nexus/*)
                images_nexus=true
                ;;
              core_matrix/vendor/simple_inference/*)
                core_matrix=true
                simple_inference=true
                ;;
              core_matrix/*)
                core_matrix=true
                ;;
            esac
          done

          {
            echo "agent_fenix=$agent_fenix"
            echo "core_matrix=$core_matrix"
            echo "core_matrix_cli=$core_matrix_cli"
            echo "execution_runtime_nexus=$execution_runtime_nexus"
            echo "images_nexus=$images_nexus"
            echo "simple_inference=$simple_inference"
            echo "verification=$verification"
          } >> "$GITHUB_OUTPUT"

  execution_runtime_nexus_verify:
    name: execution_runtimes/nexus / verify
    needs: changes
    if: needs.changes.outputs.execution_runtime_nexus == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: execution_runtimes/nexus
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/execution_runtimes/nexus/Gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Run Nexus test suite
        run: bundle exec rake test

      - name: Run Nexus lint
        run: bundle exec rubocop

      - name: Build packaged gem
        run: |
          rm -rf tmp/package_smoke
          mkdir -p tmp/package_smoke/gems tmp/package_smoke/home
          rm -f cybros_nexus-*.gem
          bundle exec gem build cybros_nexus.gemspec

      - name: Install packaged gem into a clean GEM_HOME
        run: |
          GEM_HOME="$PWD/tmp/package_smoke/gems" \
          GEM_PATH="$PWD/tmp/package_smoke/gems" \
          gem install --no-document --install-dir "$PWD/tmp/package_smoke/gems" ./cybros_nexus-*.gem

      - name: Smoke check packaged nexus executable
        run: |
          HOME="$PWD/tmp/package_smoke/home" \
          GEM_HOME="$PWD/tmp/package_smoke/gems" \
          GEM_PATH="$PWD/tmp/package_smoke/gems" \
          PATH="$PWD/tmp/package_smoke/gems/bin:$PATH" \
          nexus --help

          HOME="$PWD/tmp/package_smoke/home" \
          GEM_HOME="$PWD/tmp/package_smoke/gems" \
          GEM_PATH="$PWD/tmp/package_smoke/gems" \
          PATH="$PWD/tmp/package_smoke/gems/bin:$PATH" \
          nexus run --help

  images_nexus_verify:
    name: images/nexus / verify
    needs: changes
    if: needs.changes.outputs.images_nexus == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build nexus runtime base
        run: docker build -f images/nexus/Dockerfile -t nexus-local .

      - name: Verify nexus runtime base
        run: docker run --rm -v "${{ github.workspace }}:/workspace" nexus-local /workspace/images/nexus/verify.sh

  agent_fenix_scan_ruby:
    name: agents/fenix / scan
    needs: changes
    if: needs.changes.outputs.agent_fenix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agents/fenix
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/agents/fenix/Gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.5"

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  agent_fenix_lint:
    name: agents/fenix / lint
    needs: changes
    if: needs.changes.outputs.agent_fenix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agents/fenix
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/agents/fenix/Gemfile
      RUBOCOP_CACHE_ROOT: ${{ github.workspace }}/agents/fenix/tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.5"

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('agents/fenix/.ruby-version', 'agents/fenix/.rubocop.yml', 'agents/fenix/**/.rubocop_todo.yml', 'agents/fenix/Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: agent_fenix-rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            agent_fenix-rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  agent_fenix_test:
    name: agents/fenix / test
    needs: changes
    if: needs.changes.outputs.agent_fenix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agents/fenix
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/agents/fenix/Gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.5"

      - name: Run tests
        env:
          RAILS_ENV: test
        run: bin/rails db:test:prepare test

  core_matrix_scan_ruby:
    name: core_matrix / scan
    needs: changes
    if: needs.changes.outputs.core_matrix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: core_matrix
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/core_matrix/Gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  core_matrix_lint:
    name: core_matrix / lint
    needs: changes
    if: needs.changes.outputs.core_matrix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: core_matrix
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/core_matrix/Gemfile
      RUBOCOP_CACHE_ROOT: ${{ github.workspace }}/core_matrix/tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('core_matrix/.ruby-version', 'core_matrix/.rubocop.yml', 'core_matrix/**/.rubocop_todo.yml', 'core_matrix/Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: core-matrix-rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            core-matrix-rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  core_matrix_test:
    name: core_matrix / test
    needs: changes
    if: needs.changes.outputs.core_matrix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: core_matrix
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/core_matrix/Gemfile
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Prepare Rails credentials
        run: EDITOR=cat bin/rails credentials:edit

      - name: Run tests
        run: bin/rails db:test:prepare test

  core_matrix_system_test:
    name: core_matrix / system test
    needs: changes
    if: needs.changes.outputs.core_matrix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: core_matrix
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/core_matrix/Gemfile
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Prepare Rails credentials
        run: EDITOR=cat bin/rails credentials:edit

      - name: Run system tests
        run: bin/rails db:test:prepare test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: core-matrix-screenshots
          path: ${{ github.workspace }}/core_matrix/tmp/screenshots
          if-no-files-found: ignore

  core_matrix_cli_test:
    name: core_matrix_cli / test
    needs: changes
    if: needs.changes.outputs.core_matrix_cli == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: core_matrix_cli
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/core_matrix_cli/Gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Run CLI test suite
        run: bundle exec rake test

      - name: Run CLI lint
        run: bundle exec rubocop --no-server

  verification_pure_test:
    name: verification / pure
    needs: changes
    if: needs.changes.outputs.verification == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: verification
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/verification/Gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Run pure verification tests
        run: bundle exec rake test

  verification_core_matrix_hosted_test:
    name: verification / core_matrix_hosted
    needs: changes
    if: needs.changes.outputs.verification == 'true' || needs.changes.outputs.core_matrix == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: core_matrix
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/core_matrix/Gemfile
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Prepare Rails credentials
        run: EDITOR=cat bin/rails credentials:edit

      - name: Run CoreMatrix-hosted verification tests
        run: bash ../verification/bin/test_core_matrix_hosted.sh

  simple_inference:
    name: core_matrix/vendor/simple_inference
    needs: changes
    if: needs.changes.outputs.simple_inference == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: core_matrix/vendor/simple_inference
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/core_matrix/vendor/simple_inference/Gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Run the default task
        run: bundle exec rake
